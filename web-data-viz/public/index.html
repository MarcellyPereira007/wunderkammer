<!-- Vai ter o pc desligado, boot, e terminal -->
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge"> <!-- ESTUDAR -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>mimiomia OS</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/index.css" /> <!--CSS da página-->
  <link rel="icon" href="./assets/icon/favicon2.ico" /> <!--Ícone da aba-->
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <!-- Esse preconnect é pra "pré carregar" a fonte que você vai usar. Supostamente é mais eficiente esse pre carregamento mas preciso CONFIRMAR se é isso mesmo-->
</head>

<body>

  <div id="container"> <!--Pra não deixar vazar pra horizontal-->

    <div class="tela-pc"> <!--Toda tela com o pc-->

      <div class="caixa-monitor">
        <img class="monitorcrt" src="assets/img/index/crtmonitor.png"
          alt="Imagem de um monitor CRT com botão no gabinete clicável">

        <button id="btn-ligar"></button>
      </div>

    </div>

    <div class="tela-boot"></div> <!--Toda tela de boot-->

    <div class="tela-terminal" style="display: none"></div> <!--Toda tela de terminal com login e cadastro-->

  </div>

  <audio id="som-clique" src="assets/audio/apertandobotao.mp3"></audio>
  <audio id="som-boot" src="assets/audio/maquinaligando.mp3"></audio>
  <audio id="som-logoreveal" src="assets/audio/logoreveal.mp3"></audio>

  <script>
    //Pegar o botão de btn-ligar 
    var botaoLigar = document.getElementById('btn-ligar');
    //Pegar a div da tela crtmonitor 
    var telaMonitor = document.querySelector('.tela-pc');
    //Pegar a div da tela de boot
    var telaBoot = document.querySelector('.tela-boot');

    // Pegar os áudios
    var somClique = document.getElementById('som-clique');
    var somBoot = document.getElementById('som-boot');
    var somLogo = document.getElementById('som-logoreveal');

    // Lógica de trocar as telas
    function trocarTelas() {
      telaMonitor.style.display = "none"; // Pra tirar a tela de vez
      telaBoot.classList.add("aparecendo"); // Mostra a tela preta com a transição
  }

    // Lógica pra ligar o pc
    function ligarPC() {

      botaoLigar.disabled = false;

      somClique.play(); /* Pra tocar o audio q pegou */

      //Inverter a ordem da visibildade aplicando as classes criadas no css mudando a opacidade e com a transição
      //Tira a tela de monitor de visivel
      telaMonitor.classList.add("apagando");

      somBoot.play(); /* Pra tocar o audio de som de pc ligando, com ventoinhas */

      setTimeout (trocarTelas, 1000); /* VALIDAR - O que vai fazer e qual o tempo pra isso. Tem que bater com o tempo da transição definida no css*/ 
    }

    //Chama a função pro botão
    botaoLigar.onclick = ligarPC; // Se colocar parenteses ele executa na hora mesmo sem clicar. Ai muda a tela
  </script>
</body>

</html>
