<!-- Vai ter o pc desligado, boot, e terminal -->
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge"> <!-- ESTUDAR -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>mimiomia OS</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/index.css" /> <!--CSS da página-->
  <link rel="icon" href="./assets/icon/favicon2.ico" /> <!--Ícone da aba-->
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <!-- Esse preconnect é pra "pré carregar" a fonte que você vai usar. Supostamente é mais eficiente esse pre carregamento mas preciso CONFIRMAR se é isso mesmo-->
</head>

<body>

  <div id="container"> <!--Pra não deixar vazar pra horizontal-->

    <div class="tela-pc"> <!--Toda tela com o pc-->

      <div class="caixa-monitor">
        <img class="monitorcrt" src="assets/img/index/crtmonitor.png"
          alt="Imagem de um monitor CRT com botão no gabinete clicável">

        <button id="btn-ligar"></button>
      </div>

    </div>

    <div class="tela-boot" style="display: none"></div> <!--Toda tela de boot-->

    <div class="tela-terminal" style="display: none"></div> <!--Toda tela de terminal com login e cadastro-->

  </div>



  <script>
    //Pegar o botão de btn-ligar 
    var botaoLigar = document.getElementById('btn-ligar');
    //Pegar a div da tela crtmonitor 
    var telaMonitor = document.querySelector('.tela-pc');
    //Pegar a div da tela de boot
    var telaBoot = document.querySelector('.tela-boot');

    // Lógica pra ligar o pc
    function ligarPC() {
      //Mudando o estado do botão
      if (botaoLigar.disabled) {
        botaoLigar.disabled = false; //Ativa
      } else {
        botaoLigar.disabled = true;  //Desativa
      }

      //Inverter a ordem da visibildade dependendo do que tiver ativo
      if (telaMonitor.style.display == "none") {
        telaBoot.style.display = "none";
        telaMonitor.style.display = "block";
      } else {
        telaBoot.style.display = "block";
        telaMonitor.style.display = "none";
      }
    }

    //Chama a função pro botão
    botaoLigar.onclick = ligarPC; //Se colocar parenteses ele executa na hora mesmo sem clicar. Ai muda a tela
  </script>
</body>

</html>
